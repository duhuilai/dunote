name: Build duNote

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: npm install
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build frontend
        run: npm run build
      
      - name: Clean old bundle artifacts
        shell: bash
        run: rm -rf src-tauri/target/release/bundle
      
      - name: Build Tauri app
        run: npm run tauri build
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
      
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: duNote-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Clean existing release assets
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Cleaning existing release assets for: $TAG"
          # Get release ID (fail silently if no release exists)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id' 2>/dev/null || echo "")
          if [ -z "$RELEASE_ID" ]; then
            echo "No existing release found, skipping cleanup."
          else
            echo "Found release ID: $RELEASE_ID"
            # List and delete each asset
            ASSET_IDS=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[].id' 2>/dev/null || echo "")
            for ASSET_ID in $ASSET_IDS; do
              echo "Deleting asset ID: $ASSET_ID"
              gh api --method DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
            done
            echo "All old assets deleted."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: duNote ${{ github.ref_name }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          body: |
            ## duNote ${{ github.ref_name }}

            ### 新功能
            - 笔记编辑支持 Tab 键缩进：普通文本插入缩进、列表/任务项层级缩进、代码块插入空格、表格内 Tab 切换单元格
            - 表格列宽拖拽优化：鼠标悬停列框线显示左右箭头光标（↔），可拖拽调整列宽
            - **应用内检查更新**：启动时自动检测 GitHub 发布的新版本，设置页「关于与更新」可手动检查；发现新版本时左下角显示提示，点击即可在软件内直接下载安装包并启动安装
            - **Gitee 历史同步**：笔记历史可同步至 Gitee 仓库。配置仅需「私人令牌 + 仓库名」（API 地址内置默认）
              - 生成历史：调用 Gitee 接口推送版本快照，成功后提示「生成成功」
              - 还原历史：从 Gitee 拉取版本记录并还原

            ### 修复
            - 彻底修复关闭软件重新打开后未恢复上次打开的本地文件夹（确保 AppConfig 目录存在并正确写入/读取配置）
            - 新增恢复上次打开的笔记：重新打开软件后自动定位并打开关闭前正在浏览的笔记
            - 修复笔记详情顶部标题/路径/更新时间与当前选中笔记不一致的问题（切换笔记时强制重渲染）
            - **修复 Gitee 历史同步失败只提示“生成失败”的问题**：改为使用 Authorization 请求头认证，清洗本地文件路径中的非法字符作为远程目录，并暴露真实错误信息
            - 设置页新增「测试连接」按钮，可一键检测 Gitee 令牌与仓库名是否正确
            - **修复 Gitee 测试连接/同步返回 404 Not Found Project**：仓库路径此前被整体 URL 编码，导致 Gitee API 找不到仓库；现改为按 owner/repo 分段编码，并支持仅填仓库名时自动探测所属用户
            - **修复应用内「下载并更新」报 Load failed**：WebView 原生 fetch 无法正确处理 GitHub Release 安装包下载的 302 跳转；改为使用 Tauri HTTP 插件，允许跟随重定向，从而稳定下载并启动安装包
            - **Gitee 备份按本地文件夹层级存储**：历史快照现按笔记相对「打开的文件夹」的路径建立目录树（如 dunote-history/工作/项目A/笔记1/<时间>.json），而非原先平铺的单层目录；每个备份文件内额外写入本地绝对路径、相对路径、应用版本等详细备份信息（兼容旧版单层目录的历史记录，拉取时自动合并）
            - 修复表格行较多出现滚动条后，表格下方无法继续新增内容的问题
            - 修复 TipTap v3 handleKeyDown 签名错误导致 Enter 键无法换行的问题
            - 修复重新扫描本地目录时已加载笔记内容被清空的问题

            ### 平台支持
            - Windows (MSI / NSIS)
            - macOS (DMG)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
