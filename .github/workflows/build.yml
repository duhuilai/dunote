name: Build duNote

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: npm install
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build frontend
        run: npm run build
      
      - name: Build Tauri app
        run: npm run tauri build
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
      
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: duNote-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Delete existing release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Cleaning up existing release: $TAG"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: duNote ${{ github.ref_name }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          body: |
            ## duNote ${{ github.ref_name }}

            ### 新功能与修复
            - 修复选中本地目录后新建笔记未创建文件的问题
            - 修复导出功能：使用 Tauri 原生保存对话框，本地笔记导出不再为空
            - 修复新建文件夹后侧边栏未刷新的问题
            - 补充 turndown-plugin-gfm 类型声明，修复构建错误
            - 支持本地 Markdown 文件编辑（自动 MD↔HTML 转换）
            - 编辑后自动保存回源文件
            - 表格与任务列表（GFM）正确保存
            - 文件夹选择跨会话持久化
            - 恢复 HTML/Word/PDF/Markdown 四种导出格式
            - 支持子文件夹创建
            - 修复刷新后文件夹选择丢失问题

            ### 平台支持
            - Windows (MSI / NSIS)
            - macOS (DMG)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
