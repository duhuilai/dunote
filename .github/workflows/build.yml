name: Build duNote

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: npm install
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build frontend
        run: npm run build
      
      - name: Build Tauri app
        run: npm run tauri build
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
      
      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: duNote-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: duNote-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Clean existing release assets
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Cleaning existing release assets for: $TAG"
          # Get release ID (fail silently if no release exists)
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id' 2>/dev/null || echo "")
          if [ -z "$RELEASE_ID" ]; then
            echo "No existing release found, skipping cleanup."
          else
            echo "Found release ID: $RELEASE_ID"
            # List and delete each asset
            ASSET_IDS=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --jq '.[].id' 2>/dev/null || echo "")
            for ASSET_ID in $ASSET_IDS; do
              echo "Deleting asset ID: $ASSET_ID"
              gh api --method DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
            done
            echo "All old assets deleted."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: duNote ${{ github.ref_name }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          body: |
            ## duNote ${{ github.ref_name }}

            ### 新功能
            - 笔记编辑支持 Tab 键缩进：普通文本插入缩进、列表/任务项层级缩进、代码块插入空格、表格内 Tab 切换单元格
            - 表格列宽拖拽优化：鼠标悬停列框线显示左右箭头光标（↔），可拖拽调整列宽

            ### 修复
            - 修复表格行较多出现滚动条后，表格下方无法继续新增内容的问题
            - 修复 TipTap v3 handleKeyDown 签名错误导致 Enter 键无法换行的问题
            - 修复重新扫描本地目录时已加载笔记内容被清空的问题

            ### 平台支持
            - Windows (MSI / NSIS)
            - macOS (DMG)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
